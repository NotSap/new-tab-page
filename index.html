<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickTab</title>
    <style>
        /* Basic reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1115;
            --bg-soft: #151922;
            --card: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f3f4f6;
            --muted: #a1a1aa;
            --danger: #ef4444;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, var(--bg), var(--bg-soft));
            overflow: hidden;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 22px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
        }

        .clock {
            font-size: 1rem;
            color: var(--muted);
        }

        .search-box {
            width: 100%;
            max-width: 680px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 999px;
            padding: 14px 18px;
            backdrop-filter: blur(10px);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 1rem;
        }

        .search-box input::placeholder,
        .todo-row input::placeholder {
            color: var(--muted);
        }

        .search-box button,
        .todo-row button {
            border: none;
            background: #d1d5db;
            color: #111827;
            border-radius: 999px;
            padding: 12px 16px;
            cursor: pointer;
        }

        .shortcuts {
            width: 100%;
            max-width: 760px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 14px;
        }

        .shortcut {
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 18px 12px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .shortcut .icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #d1d5db;
        }

        .todo {
            width: 100%;
            max-width: 680px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 18px;
            backdrop-filter: blur(10px);
        }

        .todo h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--muted);
            font-weight: normal;
        }

        .todo-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .todo-row input {
            flex: 1;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 16px;
            outline: none;
        }

        ul {
            list-style: none;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-top: 1px solid var(--card-border);
        }

        .delete-btn {
            border: none;
            background: transparent;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
        }

        .hint {
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="brand">QuickTab</div>

        <div class="clock" id="clock">00:00:00</div>

        <!-- Search form -->
        <form class="search-box" id="searchForm">
            <input type="text" id="searchInput" placeholder="Search Google or type a URL..." />
            <button type="submit">Search</button>
        </form>

        <!-- Shortcut links -->
        <div class="shortcuts">
            <a class="shortcut" href="https://www.google.com" target="_blank">
                <div class="icon">G</div>
                Google
            </a>
            <a class="shortcut" href="https://www.youtube.com" target="_blank">
                <div class="icon">▶</div>
                YouTube
            </a>
            <a class="shortcut" href="https://www.gmail.com" target="_blank">
                <div class="icon">✉</div>
                Gmail
            </a>
            <a class="shortcut" href="https://www.github.com" target="_blank">
                <div class="icon">⌘</div>
                GitHub
            </a>
        </div>

        <!-- To-do section -->
        <section class="todo">
            <h2>Quick Notes / To-Do</h2>
            <div class="todo-row">
                <input type="text" id="todoInput" placeholder="Add a task..." />
                <button type="button" id="addBtn">Add</button>
            </div>
            <ul id="todoList"></ul>
        </section>

        <div class="hint">Press Enter to search • Click a shortcut to open</div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m + ':' + s;
        }

        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query !== '') {
                if (query.startsWith('http://') || query.startsWith('https://')) {
                    window.location.href = query;
                } else {
                    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                }
            }
        });

        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const addBtn = document.getElementById('addBtn');
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            todoList.innerHTML = '';
            tasks.forEach(function (task, index) {
                const li = document.createElement('li');
                li.textContent = task;

                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.textContent = '✕';
                del.onclick = function () {
                    tasks.splice(index, 1);
                    saveTasks();
                    renderTasks();
                };

                li.appendChild(del);
                todoList.appendChild(li);
            });
        }

        function addTask() {
            const text = todoInput.value.trim();
            if (text === '') return;
            tasks.push(text);
            saveTasks();
            renderTasks();
            todoInput.value = '';
        }

        addBtn.addEventListener('click', addTask);
        todoInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') addTask();
        });

        renderTasks();
    </script>
</body>
</html>
